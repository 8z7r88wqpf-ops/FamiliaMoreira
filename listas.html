<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CompraDelMes - Listas de Compras">
    <meta name="theme-color" content="#11845b">
    <title>CompraDelMes - Listas de Compras</title>
    <link rel="stylesheet" href="assets/css/compradelmes.css">
    <style>
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--muted);
            text-decoration: none;
            font-size: 0.85rem;
            margin-bottom: 12px;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--primary); }
        
        .listas-page {
            max-width: 700px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← Voltar ao início</a>
        
        <header>
            <h1>Minhas <span>Listas</span></h1>
            <div class="header-actions">
                <button class="btn btn-primary" onclick="showNewListModal()" aria-label="Criar nova lista">+ Nova Lista</button>
            </div>
        </header>

        <div class="dashboard-strip" role="status" aria-live="polite">
            <div class="metric">
                <span>Listas ativas</span>
                <strong id="metricLists">0</strong>
            </div>
            <div class="metric">
                <span>Produtos planeados</span>
                <strong id="metricItems">0</strong>
            </div>
            <div class="metric">
                <span>Total estimado</span>
                <strong id="metricTotal">0,00€</strong>
            </div>
        </div>
        
        <div class="listas-page">
            <div class="card">
                <h2>Todas as listas</h2>
                <div id="listasContainer">
                    <div class="empty-state">
                        <div class="icon">📝</div>
                        <p>Crie uma nova lista para começar</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- New List Modal -->
    <div class="modal-overlay" id="newListModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal">
            <h2 id="modalTitle">Nova Lista de Compras</h2>
            <input type="text" id="newListName" placeholder="Nome da lista (ex: Compras Julho)" onkeydown="if(event.key==='Enter') createList()" aria-label="Nome da lista">
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal('newListModal')">Cancelar</button>
                <button class="btn btn-primary" onclick="createList()">Criar Lista</button>
            </div>
        </div>
    </div>
    
    <!-- Toast -->
    <div class="toast" id="toast" role="alert" aria-live="assertive"></div>
    
    <script src="assets/js/compradelmes.js"></script>
</body>
</html>
